version: '3.8'
services:
  humq:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - STATIC_DIR=/app/web/dist
      - DB_DRIVER=sqlite
      - DB_DSN=/app/data/humq.db
    volumes:
      - humq-data:/app/data
    restart: unless-stopped

volumes:
  humq-data:
